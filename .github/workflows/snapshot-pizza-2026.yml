name: Lock Pizza Day 2026 BTC/VND price

# Fires once on 22 May 2026 at 13:00 UTC (= 20:00 ICT, after the event ends
# at 18:00 ICT). Also manually dispatchable from the Actions tab if we need
# to re-snapshot (pass force=true to overwrite an already-locked row).
on:
  schedule:
    - cron: "0 13 22 5 *"
  workflow_dispatch:
    inputs:
      force:
        description: "Overwrite an already-locked 2026 row?"
        type: boolean
        default: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run snapshot script
        env:
          BITCOINVN_API_KEY: ${{ secrets.BITCOINVN_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            node scripts/snapshot-pizza-2026.mjs --force
          else
            node scripts/snapshot-pizza-2026.mjs
          fi

      - name: Commit the locked price if changed
        run: |
          if git diff --quiet -- public/data/pizza-day-history.json; then
            echo "no change - already locked or fetch was a no-op"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/pizza-day-history.json
          git commit -m "chore: lock Pizza Day 2026 BTC/VND snapshot from BitcoinVN"
          git push origin HEAD:main
